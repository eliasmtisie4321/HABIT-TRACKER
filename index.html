<h2 class="total">HABIT TRACKER</h2>

</p>

<h2>RECORD YOUR HABITS</h2>
<ul id="list"></ul>



    <form class="myform">

    <input class="HABIT" placeholder="HABIT NAME"> 
    <p id="error"></p>
        <input class="TARGET" type="number" placeholder="TARGET DAYS" min="1" max="7">
    </div>

    <div>
        <select class="CATEGORY">
            <option value="">Habits category</option>
            <option value="Health">Health</option>
